services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3333
      DATABASE_PATH: /app/data/fila-delivery.sqlite
      BACKUP_DIR: /app/backups
    volumes:
      - api-data:/app/data
      - api-backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "--experimental-sqlite", "-e", "fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-data:
  api-backups:
